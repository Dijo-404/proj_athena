name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ensure zip is available
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Generate icons
        run: npm run icons

      - name: Build
        run: npm run build

      - name: Package
        run: npm run package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: athena-extension
          path: dist/athena.zip
